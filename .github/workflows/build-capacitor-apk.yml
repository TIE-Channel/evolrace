name: Build Capacitor APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ImageMagick (для генерации иконок)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-capacitor-v2-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-capacitor-v2-

      - name: Install npm dependencies
        run: |
          npm install
          echo "=== Verifying Capacitor CLI ==="
          ls -la node_modules/.bin/cap || echo "WARNING: cap not in .bin"
          ls -la node_modules/@capacitor/cli/bin/capacitor || echo "WARNING: capacitor binary not found"
          echo ""
          echo "=== Verifying cordova-plugin-purchase (IAP) ==="
          if [ -d "node_modules/cordova-plugin-purchase" ]; then
            echo "OK - cordova-plugin-purchase installed:"
            cat node_modules/cordova-plugin-purchase/package.json | grep -E '"version"|"name"' | head -2
          else
            echo "WARNING: cordova-plugin-purchase NOT installed (IAP will not work)"
          fi
          echo ""
          echo "=== Installed packages ==="
          npm list --depth=0 || true

      - name: Prepare web content (copy to www/)
        run: |
          mkdir -p www
          cp index.html www/
          cp sw.js www/ 2>/dev/null || true
          cp manifest.webmanifest www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true
          cp icon-maskable.png www/ 2>/dev/null || true
          cp tie-logo.png www/ 2>/dev/null || true
          echo "=== www/ contents ==="
          ls -la www/

      - name: Add Android platform to Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists, skipping cap add"
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          echo ""
          echo "=== Cordova plugins synced ==="
          if [ -d "android/capacitor-cordova-android-plugins" ]; then
            ls android/capacitor-cordova-android-plugins/src/main/java 2>/dev/null || echo "(no java folder)"
            echo ""
            echo "=== build.gradle of cordova plugins (dependencies) ==="
            cat android/capacitor-cordova-android-plugins/build.gradle 2>/dev/null | head -50 || echo "(no build.gradle)"
          fi
          echo ""
          echo "=== Capacitor plugins (from capacitor.plugins.json) ==="
          cat android/app/src/main/assets/capacitor.plugins.json 2>/dev/null || echo "(no capacitor.plugins.json)"

      - name: Bump minSdkVersion to 24 (required by Google Play Billing 8.x)
        run: |
          # cordova-plugin-purchase v13 использует com.android.billingclient:billing:8.3.0
          # который требует minSdkVersion >= 23. Capacitor ставит по умолчанию 22.
          # Поднимаем до 24 - современный baseline для Play Store (covers ~99% устройств).
          VARS_FILE="android/variables.gradle"
          if [ ! -f "$VARS_FILE" ]; then
            echo "ERROR: $VARS_FILE not found"
            exit 1
          fi
          echo "=== Original variables.gradle ==="
          cat "$VARS_FILE"

          # Заменяем minSdkVersion на 24
          sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 24/' "$VARS_FILE"

          echo ""
          echo "=== Updated variables.gradle ==="
          cat "$VARS_FILE"

      - name: Set versionCode for Play Store deployment
        run: |
          # Play Store требует уникальный versionCode для каждого нового AAB.
          # Используем GitHub Actions run number - всегда увеличивается.
          # versionName можно оставить семантический (1.0.0).
          # Базовый offset 10 чтобы избежать конфликтов с существующими versionCodes.
          BUILD_GRADLE="android/app/build.gradle"
          VERSION_CODE=$((10 + ${{ github.run_number }}))
          echo "Setting versionCode to: $VERSION_CODE"

          # Заменяем versionCode в android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" "$BUILD_GRADLE"

          # Также обновляем versionName с номером сборки для удобства отладки
          # (формат: 1.0.X где X = run number)
          VERSION_NAME="1.0.${{ github.run_number }}"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" "$BUILD_GRADLE"

          echo "=== Updated versionCode and versionName ==="
          grep -E "versionCode|versionName" "$BUILD_GRADLE"

      - name: Generate Android app icons
        run: |
          # Создаём папки mipmap для разных плотностей экрана
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$density
          done

          # Размеры иконок для каждой плотности
          declare -A SIZES=(
            ["mdpi"]=48
            ["hdpi"]=72
            ["xhdpi"]=96
            ["xxhdpi"]=144
            ["xxxhdpi"]=192
          )

          # Генерируем стандартные иконки (ic_launcher, ic_launcher_round)
          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            convert icon-512.png -resize ${size}x${size} \
              android/app/src/main/res/mipmap-$density/ic_launcher.png

            convert icon-512.png -resize ${size}x${size} \
              android/app/src/main/res/mipmap-$density/ic_launcher_round.png

            # Adaptive icon foreground - заполняем весь 108x108dp полностью
            # БЕЗ прозрачной рамки (если устройство применит круглую маску - углы обрежутся,
            # но это лучше чем видимая рамка)
            adaptive_full=$((size * 108 / 48))

            convert icon-512.png \
              -resize ${adaptive_full}x${adaptive_full} \
              android/app/src/main/res/mipmap-$density/ic_launcher_foreground.png

            echo "Generated icons for $density (${size}x${size}, adaptive ${adaptive_full}x${adaptive_full} - full fill)"
          done

          # Adaptive icon XML для Android 8+
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF

          # Цвет фона adaptive иконки
          mkdir -p android/app/src/main/res/values
          if [ -f android/app/src/main/res/values/ic_launcher_background.xml ]; then
            rm android/app/src/main/res/values/ic_launcher_background.xml
          fi
          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#b8e0ff</color>
          </resources>
          XMLEOF

          echo "=== Generated icons ==="
          find android/app/src/main/res/mipmap-* -name "*.png" | head -10

      - name: Configure fullscreen styles
        run: |
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          echo "=== Original styles.xml ==="
          cat "$STYLES_FILE"

          # Перезаписываем styles.xml с fullscreen темой
          cat > "$STYLES_FILE" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:background">@null</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">false</item>
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>

              <style name="AppTheme.NoActionBar" parent="AppTheme">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">false</item>
              </style>

              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
                  <item name="android:background">@drawable/splash</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          XMLEOF
          echo "=== Updated styles.xml ==="
          cat "$STYLES_FILE"

      - name: Configure MainActivity for immersive mode and audio autoplay
        run: |
          # Находим MainActivity.java
          MAIN_ACTIVITY=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "MainActivity at: $MAIN_ACTIVITY"

          # Извлекаем package из существующего файла
          PACKAGE=$(grep "^package" "$MAIN_ACTIVITY" | head -1 | sed 's/package //;s/;//')
          echo "Package: $PACKAGE"

          # Перезаписываем MainActivity:
          # 1. Immersive mode (скрытие status и nav bar)
          # 2. Keep screen on
          # 3. setMediaPlaybackRequiresUserGesture(false) - audio играет без тапа
          cat > "$MAIN_ACTIVITY" << JAVAEOF
          package $PACKAGE;

          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  hideSystemUI();
                  enableAudioAutoplay();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      hideSystemUI();
                  }
              }

              private void hideSystemUI() {
                  // Immersive sticky mode - скрываем status и navigation bar
                  View decorView = getWindow().getDecorView();
                  decorView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                      | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                      | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_FULLSCREEN
                  );
                  // Экран не выключается во время игры
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
              }

              private void enableAudioAutoplay() {
                  // Разрешаем audio/video autoplay без user gesture
                  // Это нужно чтобы Web Audio API заработал сразу при загрузке игры
                  try {
                      WebView webView = this.bridge.getWebView();
                      if (webView != null) {
                          webView.getSettings().setMediaPlaybackRequiresUserGesture(false);
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          JAVAEOF
          echo "=== Updated MainActivity ==="
          cat "$MAIN_ACTIVITY"

      - name: Configure AdMob and orientation in AndroidManifest
        run: |
          ANDROID_MANIFEST="android/app/src/main/AndroidManifest.xml"
          ADMOB_APP_ID="ca-app-pub-3940256099942544~3347511713"

          echo "=== Original AndroidManifest.xml ==="
          cat "$ANDROID_MANIFEST"

          # Используем Python для надёжной модификации XML
          python3 << PYEOF
          import re

          with open("$ANDROID_MANIFEST", "r") as f:
              content = f.read()

          # 1. Добавляем AdMob meta-data в <application> если ещё нет
          if "com.google.android.gms.ads.APPLICATION_ID" not in content:
              admob_meta = '<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="$ADMOB_APP_ID" />'
              content = content.replace(
                  '</application>',
                  '    ' + admob_meta + '\n    </application>'
              )

          # 2. screenOrientation: добавляем или заменяем
          if 'android:screenOrientation=' in content:
              # Заменяем существующее значение
              content = re.sub(
                  r'android:screenOrientation="[^"]*"',
                  'android:screenOrientation="sensorLandscape"',
                  content
              )
              print("Replaced existing screenOrientation")
          else:
              # Добавляем новый атрибут к <activity>
              content = re.sub(
                  r'(<activity\b)',
                  r'\1\n            android:screenOrientation="sensorLandscape"',
                  content,
                  count=1
              )
              print("Added new screenOrientation")

          # 3. configChanges: только заменяем если уже есть (Capacitor добавляет по умолчанию)
          # Не дублируем атрибут чтобы не сломать manifest
          if 'android:configChanges=' in content:
              # Уже есть от Capacitor - оставляем как есть, манифест валиден
              print("configChanges already exists (from Capacitor default), leaving as is")
          else:
              # Если внезапно нет - добавляем
              content = re.sub(
                  r'(<activity\b)',
                  r'\1\n            android:configChanges="orientation|screenSize|screenLayout|keyboardHidden"',
                  content,
                  count=1
              )
              print("Added new configChanges")

          # 4. BILLING permission для Google Play Billing (cordova-plugin-purchase)
          # Если cordova-plugin-purchase уже добавил - пропускаем
          if 'com.android.vending.BILLING' not in content:
              # Добавляем permission перед <application>
              billing_perm = '<uses-permission android:name="com.android.vending.BILLING" />'
              content = re.sub(
                  r'(\s*<application)',
                  r'\n    ' + billing_perm + r'\1',
                  content,
                  count=1
              )
              print("Added BILLING permission")
          else:
              print("BILLING permission already present (added by cordova-plugin-purchase)")

          with open("$ANDROID_MANIFEST", "w") as f:
              f.write(content)

          print("Manifest updated successfully")
          PYEOF

          echo ""
          echo "=== Updated AndroidManifest.xml ==="
          cat "$ANDROID_MANIFEST"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -dname "cn=Evolrace, ou=Apps, o=TieChannel, c=US" \
            -alias evolrace \
            -keypass android \
            -keystore android/app/evolrace.keystore \
            -storepass android \
            -validity 20000 \
            -keyalg RSA \
            -keysize 2048

      - name: Print signing fingerprint
        run: |
          keytool -list -v \
            -keystore android/app/evolrace.keystore \
            -alias evolrace \
            -storepass android \
            -keypass android | grep -E "SHA256:" | head -1

      - name: Configure Gradle for CI
        working-directory: android
        run: |
          cat > gradle.properties << 'GRADLEEOF'
          org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=false
          GRADLEEOF
          cat gradle.properties

      - name: Build APK
        working-directory: android
        timeout-minutes: 60
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/evolrace.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=evolrace \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon \
            --build-cache

      - name: Build AAB
        if: success()
        working-directory: android
        timeout-minutes: 30
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/evolrace.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=evolrace \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon \
            --build-cache

      - name: Find generated artifacts
        if: always()
        run: |
          echo "=== APKs ==="
          find android -name "*.apk" -type f 2>/dev/null
          echo "=== AABs ==="
          find android -name "*.aab" -type f 2>/dev/null

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolrace-apk-capacitor
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolrace-aab-capacitor
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      # === DEPLOY TO GOOGLE PLAY (Internal Testing) ===
      # Запускается только если установлен secret PLAY_STORE_SERVICE_ACCOUNT_JSON.
      # Если secret не задан - step пропускается, билд всё равно успешный.
      # Подробная инструкция по настройке secret-а в PLAY_STORE_DEPLOY.md
      - name: Check Play Store deploy availability
        id: check_deploy
        run: |
          if [ -n "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Play Store service account is configured - will deploy"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Play Store service account NOT configured - skipping deploy"
            echo "Add PLAY_STORE_SERVICE_ACCOUNT_JSON secret in repo Settings to enable"
          fi

      - name: Deploy to Google Play (Internal Testing)
        if: steps.check_deploy.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.tiegames.evolrace
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          inAppUpdatePriority: 0
          # whatsNewDirectory: distribution/whatsnew  # опционально для release notes

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            android/app/build/reports/
            android/build/reports/
          if-no-files-found: ignore
          retention-days: 7
