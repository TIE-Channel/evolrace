name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-twa-v1
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-bubblewrap-v1
          restore-keys: |
            npm-bubblewrap-

      - name: Install @bubblewrap/core
        run: |
          npm init -y
          npm install @bubblewrap/core@latest

      - name: Generate TWA Android Project
        run: |
          cat > _build-twa.js << 'JSEOF'
          const path = require('path');
          const fs = require('fs');
          const http = require('http');

          function startLocalServer(repoRoot) {
            return new Promise((resolve, reject) => {
              const filesMap = {
                '/icon-512.png': path.join(repoRoot, 'icon-512.png'),
                '/icon-maskable.png': path.join(repoRoot, 'icon-maskable.png')
              };
              const server = http.createServer((req, res) => {
                console.log('  [HTTP] ' + req.method + ' ' + req.url);
                const fp = filesMap[req.url];
                if (fp && fs.existsSync(fp)) {
                  const data = fs.readFileSync(fp);
                  res.writeHead(200, { 'Content-Type': 'image/png', 'Content-Length': data.length });
                  res.end(data);
                } else {
                  res.writeHead(404); res.end('Not found');
                }
              });
              server.on('error', reject);
              server.listen(0, '127.0.0.1', () => {
                console.log('  Local HTTP server: http://127.0.0.1:' + server.address().port);
                resolve({ server, port: server.address().port });
              });
            });
          }

          (async () => {
            const repoRoot = process.cwd();
            const manifestPath = path.join(repoRoot, 'twa-manifest.json');
            const projectDir = path.join(repoRoot, 'android-project');

            console.log('=== TWA Build ===');
            console.log('Repo:', repoRoot);
            const data = JSON.parse(fs.readFileSync(manifestPath, 'utf-8'));
            const localIcon = path.join(repoRoot, 'icon-512.png');
            const localMaskable = path.join(repoRoot, 'icon-maskable.png');
            console.log('icon-512.png:', fs.statSync(localIcon).size, 'bytes');
            console.log('icon-maskable.png:', fs.statSync(localMaskable).size, 'bytes');

            const { server, port } = await startLocalServer(repoRoot);
            data.iconUrl = 'http://127.0.0.1:' + port + '/icon-512.png';
            data.maskableIconUrl = 'http://127.0.0.1:' + port + '/icon-maskable.png';

            const core = require('@bubblewrap/core');
            const { TwaGenerator, TwaManifest } = core;
            console.log('@bubblewrap/core:', require('@bubblewrap/core/package.json').version);

            const twaManifest = new TwaManifest(data);
            if (!fs.existsSync(projectDir)) fs.mkdirSync(projectDir, { recursive: true });

            console.log('Generating Android project...');
            try {
              await new TwaGenerator().createTwaProject(projectDir, twaManifest);
              console.log('Generated OK');
            } finally {
              server.close();
            }
            fs.copyFileSync(manifestPath, path.join(projectDir, 'twa-manifest.json'));
          })().catch(err => {
            console.error('FATAL:', err);
            console.error(err.stack);
            process.exit(1);
          });
          JSEOF
          node _build-twa.js
          rm -f _build-twa.js

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -dname "cn=Evolrace, ou=Apps, o=TieChannel, c=US" \
            -alias evolrace \
            -keypass android \
            -keystore android-project/android.keystore \
            -storepass android \
            -validity 20000 \
            -keyalg RSA \
            -keysize 2048

      - name: Print signing fingerprint
        run: |
          keytool -list -v \
            -keystore android-project/android.keystore \
            -alias evolrace \
            -storepass android \
            -keypass android | grep -E "SHA256:" | head -1

      - name: Configure Gradle for CI
        working-directory: android-project
        run: |
          # Оптимизированные настройки Gradle для CI
          cat > gradle.properties << 'GRADLEEOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.configureondemand=false
          android.useAndroidX=true
          android.enableJetifier=false
          kotlin.incremental=false
          GRADLEEOF
          echo "=== gradle.properties ==="
          cat gradle.properties
          echo "=== Gradle wrapper version ==="
          cat gradle/wrapper/gradle-wrapper.properties || true

      - name: Build APK with Gradle
        working-directory: android-project
        timeout-minutes: 60
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=evolrace \
            -Pandroid.injected.signing.key.password=android \
            --build-cache \
            --max-workers=2 \
            --no-daemon

      - name: Find generated artifacts
        if: always()
        run: |
          echo "=== APKs ==="
          find android-project -name "*.apk" -type f 2>/dev/null
          echo "=== AABs ==="
          find android-project -name "*.aab" -type f 2>/dev/null

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolrace-apk
          path: android-project/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolrace-aab
          path: android-project/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30
